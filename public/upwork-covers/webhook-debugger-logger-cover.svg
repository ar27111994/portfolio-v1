    <path d="M952 58h528c29 0 52 23 52 52v720c0 29-23 52-52 52H952z" fill="url(#accent)"/>
    <circle cx="1425" cy="735" r="260" fill="#fff" opacity=".14"/>
    <circle cx="1024" cy="145" r="80" fill="#fff" opacity=".13"/>
  </g>
