<g transform="translate(402 776)"><rect width="260" height="54" rx="27" fill="rgba(255,255,255,.16)" stroke="rgba(255,255,255,.52)" stroke-width="2"/><text x="130" y="35" text-anchor="middle" font-size="24" font-weight="800" fill="#fff">Validation</text></g>
