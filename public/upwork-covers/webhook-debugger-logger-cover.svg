  </defs>
  <rect width="1600" height="960" fill="url(#paper)"/>
  <circle cx="180" cy="120" r="330" fill="#2457ff" opacity=".16"/>
  <circle cx="1390" cy="160" r="360" fill="#1ca672" opacity=".14"/>
