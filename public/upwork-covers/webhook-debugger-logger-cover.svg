    <text x="60" y="38" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="900" letter-spacing="2" fill="#151515">ARLABS PROOF</text>
    <text x="0" y="238" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="102" font-weight="900" letter-spacing="-6" fill="#111">Webhook Debugger</text>
    <text x="0" y="304" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="850" fill="#4b4540">Webhook/API incident lab</text>
    <foreignObject x="0" y="438" width="730" height="160">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:36px;line-height:1.16;font-weight:650;color:#2f2a26;">Capture, inspect, replay, forward, validate, and mock webhook traffic.</div>
    </foreignObject>
    <text x="0" y="704" font-family="Consolas, ui-monospace, monospace" font-size="30" font-weight="800" fill="#111">github.com/ar27111994/webhook-debugger-logger</text>
